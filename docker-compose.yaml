version: '3.8'

services:
  my-application:
    image: 503884896971.dkr.ecr.us-east-1.amazonaws.com/my-application:latest
    container_name: my-application
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
